version: '3'

services:
  postgres:
    image: postgres:16.3
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: yachid
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres:/var/lib/postgresql/data
  yachid-api:
    image: yachid-api
    ports:
      - "3333:3333"
    depends_on:
      - postgres
    environment:
      - DB_TYPE=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=yachid
      - DB_SYNC=true
      - DB_LOG=true
      - APP_PORT=3333
      - JWT_SECRET=r9T2m6K1br9T2m6K1br9T2m6K1b


volumes:
  postgres:
    driver: local